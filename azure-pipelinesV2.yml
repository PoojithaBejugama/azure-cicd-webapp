# Trigger pipeline when code is pushed to main branch
trigger:
- main

# Use Microsoft-hosted Ubuntu agent
pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

# -----------------------------
# STEP 1: Install Terraform (script install; no Marketplace task)
# -----------------------------
- script: |
    set -e
    TF_VERSION="1.8.5"

    echo "Downloading Terraform v${TF_VERSION}..."
    curl -sSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"

    echo "Unzipping Terraform..."
    unzip -o /tmp/terraform.zip -d /tmp
    chmod +x /tmp/terraform

    # Put terraform on PATH
    if command -v sudo >/dev/null 2>&1; then
      sudo mv /tmp/terraform /usr/local/bin/terraform
    else
      mkdir -p "$(Pipeline.Workspace)/tools"
      mv /tmp/terraform "$(Pipeline.Workspace)/tools/terraform"
      echo "##vso[task.prependpath]$(Pipeline.Workspace)/tools"
    fi

    terraform version
  displayName: "Install Terraform"

# -----------------------------
# STEP 2: Terraform Apply (AUTH via Service Connection)
# -----------------------------
# AzureCLI@2 logs in using your service connection.
# addSpnToEnvironment exposes SP credentials so Terraform can use ARM_* variables.
- task: AzureCLI@2
  displayName: "Terraform Apply (using Service Connection)"
  inputs:
    azureSubscription: 'New_project1_servConn'
    scriptType: bash
    scriptLocation: inlineScript
    addSpnToEnvironment: true
    inlineScript: |
      set -e

      # Bridge the service connection creds into Terraform’s expected env vars
      export ARM_CLIENT_ID="$servicePrincipalId"
      export ARM_CLIENT_SECRET="$servicePrincipalKey"
      export ARM_TENANT_ID="$tenantId"
      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

      cd infra
      terraform init
      terraform validate
      terraform plan
      terraform apply -auto-approve



# -----------------------------
# STEP 3: Install Node & Build
# -----------------------------
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: "Install Node"

- script: |
    cd app
    npm install
  displayName: "Install App Dependencies"

# -----------------------------
# STEP 4: Deploy to App Service
# -----------------------------
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'New_project1_servConn'  #YOUR_SERVICE_CONNECTION_NAME
    appType: 'webAppLinux' 
    appName: 'webapp-devops-demo' # Must match TF name (or make static)
    package: 'app'
  displayName: "Deploy App"
